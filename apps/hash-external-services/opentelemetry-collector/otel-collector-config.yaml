receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318
  # Scrape Prometheus-format metrics that the Temporal server cluster
  # exposes on its `PROMETHEUS_ENDPOINT` (port 8000) so we get
  # server-side counters (workflow_started, persistence latency,
  # mutable-state cache, queue depth, …) alongside the worker SDK
  # metrics that arrive via OTLP.
  #
  # Temporal emits unprefixed metric names (`cache_miss`,
  # `request_latency`, `activity_end_to_end_latency`, …) that collide
  # visually with metrics from every other scrape job. Force a
  # `temporal_` prefix on everything coming out of this scrape so
  # they're disambiguated in Mimir / Grafana auto-complete. Go runtime
  # metrics from the Temporal process are also prefixed — that's
  # intentional, those are *Temporal's* runtime, not ours.
  prometheus:
    config:
      scrape_configs:
        - job_name: temporal-server
          scrape_interval: 30s
          static_configs:
            - targets: [temporal:8000]
              labels:
                service.name: temporal-server
          metric_relabel_configs:
            - source_labels: [__name__]
              regex: ^(.+)$
              target_label: __name__
              replacement: temporal_${1}
              action: replace

processors:
  batch:
  resource/deployment_environment:
    attributes:
      # Ory sets an empty deployment.environment attribute in dev
      - key: deployment.environment
        action: delete

exporters:
  otlp/tempo:
    endpoint: tempo:4317
    tls:
      insecure: true
  otlphttp/loki:
    endpoint: http://loki:3100/otlp
    tls:
      insecure: true
  otlphttp/mimir:
    endpoint: http://mimir:8080/otlp
    tls:
      insecure: true

extensions:
  health_check:
    endpoint: 0.0.0.0:13133

service:
  extensions: [health_check]
  pipelines:
    traces:
      receivers: [otlp]
      processors: [resource/deployment_environment, batch]
      exporters: [otlp/tempo]
    metrics:
      receivers: [otlp, prometheus]
      processors: [batch]
      exporters: [otlphttp/mimir]
    logs:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlphttp/loki]
