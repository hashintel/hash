[package]
name              = "hashql-eval"
authors.workspace = true
edition.workspace = true
license.workspace = true
publish.workspace = true
version.workspace = true

[dependencies]
# Public workspace dependencies
hash-graph-postgres-store = { workspace = true, public = true }
hash-graph-store          = { workspace = true, optional = true, public = true }
hashql-diagnostics        = { workspace = true, public = true }
hashql-hir                = { workspace = true, public = true }
hashql-mir                = { workspace = true, public = true }

# Public third-party dependencies

# Private workspace dependencies
hashql-core = { workspace = true }
type-system = { workspace = true, optional = true }

# Private third-party dependencies
bytes.workspace             = true
crossfire                   = "3.1.5"
derive_more                 = { workspace = true, features = ["display"] }
futures-lite                = "2.6.1"
postgres-protocol.workspace = true
postgres-types.workspace    = true
serde                       = { workspace = true }
serde_json.workspace        = true
simple-mermaid              = { workspace = true }
tokio-postgres.workspace    = true
tokio-util                  = { workspace = true, features = ["rt"] }
url.workspace               = true

[dev-dependencies]
hashql-compiletest = { workspace = true }
insta              = { workspace = true }

[features]
graph = ["dep:hash-graph-store", "dep:type-system"]

[lints]
workspace = true

[[test]]
name    = "compiletest"
harness = false

[package.metadata.sync.turborepo]
ignore-dev-dependencies = [
    "hashql-compiletest",
]
