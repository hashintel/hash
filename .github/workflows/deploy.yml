name: Deploy

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main
  merge_group:

env:
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: hashintel
  TURBO_CACHE: remote:rw

  AWS_REGION: eu-central-1
  AWS_ECR_ACCOUNT_ID: 469596578827
  AWS_DEPLOY_ACCOUNT_ID: 054238437032
  OIDC_HASH_CD_PUSH_ROLE: github-oidc-hash-cd-push
  OIDC_HASH_CD_DEPLOY_ROLE: github-oidc-hash-cd-deploy

# PR and merge_group runs cancel their previous attempt — the next push or
# queue reshuffle obsoletes the in-flight build-only validation. Push and
# workflow_dispatch share a single `publish` group so all publishing runs
# serialize against each other regardless of ref, avoiding races on the
# moving `:latest-<arch>` GHCR tags between e.g. a main push and a
# feature-branch dispatch.
concurrency:
  group: ${{ github.workflow }}-${{ (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && 'publish' || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' || github.event_name == 'merge_group' }}

jobs:
  setup:
    runs-on: ubuntu-24.04
    permissions:
      id-token: write
    outputs:
      sourcemaps: ${{ steps.packages.outputs.sourcemaps }}
    steps:
      - name: Checkout source code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 2

      - name: Install tools
        uses: ./.github/actions/install-tools
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          vault_address: ${{ secrets.VAULT_ADDR }}
          rust: false

      - name: Determine changed packages
        id: packages
        run: |
          SOURCEMAPS_QUERY='query { affectedPackages(base: "HEAD^", filter: {has: {field: TASK_NAME, value: "sentry:sourcemaps"}}) { items { name path } } }'

          SOURCEMAPS_PACKAGES=$(turbo query "$SOURCEMAPS_QUERY" \
            | jq --compact-output '.data.affectedPackages.items | [(.[] | select(.name != "//"))] | { name: [.[].name], include: . }')

          echo "sourcemaps=$SOURCEMAPS_PACKAGES" | tee -a $GITHUB_OUTPUT

  sourcemaps:
    name: Sourcemaps
    needs: [setup]
    strategy:
      matrix: ${{ fromJSON(needs.setup.outputs.sourcemaps) }}
      fail-fast: false
    if: needs.setup.outputs.sourcemaps != '{"name":[],"include":[]}' && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-24.04
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Authenticate Vault
        id: secrets
        uses: hashicorp/vault-action@4c06c5ccf5c0761b6029f56cfb1dcf5565918a3b # v3.4.0
        env:
          VAULT_ROLE: ${{ github.event_name == 'push' && 'prod' || 'dev' }}
        with:
          url: ${{ secrets.VAULT_ADDR }}
          method: jwt
          role: ${{ env.VAULT_ROLE }}
          secrets: |
            automation/data/pipelines/hash/${{ env.VAULT_ROLE }} sentry_auth_token | SENTRY_AUTH_TOKEN

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install tools
        uses: ./.github/actions/install-tools
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          vault_address: ${{ secrets.VAULT_ADDR }}

      - name: Prune repository
        uses: ./.github/actions/prune-repository
        with:
          scope: ${{ matrix.name }}

      - name: Warm up repository
        uses: ./.github/actions/warm-up-repo

      - name: Log in to Sentry
        run: sentry-cli login --auth-token ${{ steps.secrets.outputs.SENTRY_AUTH_TOKEN }}

      - name: Build sourcemaps
        run: turbo run sentry:sourcemaps --env-mode=loose --filter "${{ matrix.name }}"

  build:
    name: Build${{ (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && ' and push' || '' }} ${{ matrix.service }} (${{ matrix.arch }})
    runs-on: ${{ matrix.arch == 'arm64' && 'ubuntu-24.04-arm' || 'ubuntu-24.04' }}
    strategy:
      fail-fast: false
      matrix:
        service:
          - graph
          - api
          - frontend
          - kratos
          - hydra
          - ai-worker-ts
          - integration-worker
        arch: [arm64, amd64]
        # Services that only publish to ECR don't need an amd64 build — ECR is
        # arm64-only (staging ECS runs on Graviton).
        exclude:
          - { service: kratos, arch: amd64 }
          - { service: hydra, arch: amd64 }
        # Per-service config: paths plus the registries to publish to. Joined
        # with every remaining (service, arch) combination via `include` merge.
        include:
          - service: graph
            push: [ecr, ghcr]
            dockerfile: apps/hash-graph/docker/Dockerfile
            context: .
          - service: api
            push: [ecr, ghcr]
            dockerfile: apps/hash-api/docker/Dockerfile
            context: .
          - service: frontend
            push: [ecr, ghcr]
            dockerfile: apps/hash-frontend/docker/Dockerfile
            context: .
            # TODO(FE-752): Remove once frontend is runtime-configurable
            build_args: |
              API_ORIGIN=http://localhost:5001
              FRONTEND_URL=http://localhost:3000
          - service: kratos
            push: [ecr]
            dockerfile: infra/compose/kratos/Dockerfile
            context: infra/compose/kratos
          - service: hydra
            push: [ecr]
            dockerfile: infra/compose/hydra/Dockerfile
            context: infra/compose/hydra
          - service: ai-worker-ts
            push: [ecr, ghcr]
            dockerfile: apps/hash-ai-worker-ts/docker/Dockerfile
            context: .
          - service: integration-worker
            push: [ecr, ghcr]
            dockerfile: apps/hash-integration-worker/docker/Dockerfile
            context: .
    permissions:
      id-token: write
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      # All push policy lives here. `should_build` short-circuits the rest
      # of the job when no registry target is reachable on push/dispatch
      # (e.g. kratos/hydra on a feature-branch dispatch). PR/merge_group
      # always set should_build=true for build-only validation.
      - name: Compute targets
        id: targets
        shell: bash
        env:
          PUSH_LIST: ${{ join(matrix.push, ' ') }}
          ARCH: ${{ matrix.arch }}
          REF: ${{ github.ref }}
          EVENT: ${{ github.event_name }}
          SERVICE: ${{ matrix.service }}
          SHA: ${{ github.sha }}
          RUN_ID: ${{ github.run_id }}
          GHCR_OWNER: ${{ github.repository_owner }}
          ECR_ACCOUNT: ${{ env.AWS_ECR_ACCOUNT_ID }}
          ECR_REGION: ${{ env.AWS_REGION }}
          ECR_REPO: ${{ github.repository }}
        run: |
          is_push_event=false
          case "$EVENT" in push|workflow_dispatch) is_push_event=true ;; esac
          is_main=false
          [[ "$REF" == refs/heads/main ]] && is_main=true

          push_ecr=false
          if [[ " $PUSH_LIST " == *" ecr "* && "$ARCH" == arm64 && "$is_main" == true && "$is_push_event" == true ]]; then
            push_ecr=true
          fi
          push_ghcr=false
          if [[ " $PUSH_LIST " == *" ghcr "* && "$is_push_event" == true ]]; then
            push_ghcr=true
          fi

          push=false
          if $push_ecr || $push_ghcr; then
            push=true
          fi

          # On push/dispatch only build when we can actually publish. PR /
          # merge_group always validate.
          should_build=true
          if $is_push_event && ! $push_ecr && ! $push_ghcr; then
            should_build=false
          fi

          ecr_host="$ECR_ACCOUNT.dkr.ecr.$ECR_REGION.amazonaws.com"

          {
            echo "should_build=$should_build"
            echo "push_ecr=$push_ecr"
            echo "push_ghcr=$push_ghcr"
            echo "push=$push"

            echo "ecr_tags<<EOF"
            if $push_ecr; then
              echo "$ecr_host/$ECR_REPO/$SERVICE:staging"
              echo "$ecr_host/$ECR_REPO/$SERVICE:sha-$SHA"
              echo "$ecr_host/$ECR_REPO/$SERVICE:run-$RUN_ID"
            fi
            echo EOF

            echo "ghcr_tags<<EOF"
            if $push_ghcr; then
              echo "ghcr.io/$GHCR_OWNER/hash/$SERVICE:latest-$ARCH"
              echo "ghcr.io/$GHCR_OWNER/hash/$SERVICE:sha-$SHA-$ARCH"
            fi
            echo EOF
          } >> "$GITHUB_OUTPUT"

      - name: Configure AWS credentials (ECR push)
        if: steps.targets.outputs.push_ecr == 'true'
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a # v4.3.1
        with:
          role-to-assume: arn:aws:iam::${{ env.AWS_ECR_ACCOUNT_ID }}:role/${{ env.OIDC_HASH_CD_PUSH_ROLE }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Build${{ steps.targets.outputs.push == 'true' && ' and push' || '' }} ${{ matrix.service }} (${{ matrix.arch }})
        if: steps.targets.outputs.should_build == 'true'
        uses: ./.github/actions/docker-build-push
        with:
          CONTEXT_PATH: ${{ github.workspace }}/${{ matrix.context }}
          DOCKERFILE_LOCATION: ${{ github.workspace }}/${{ matrix.dockerfile }}
          PLATFORM: linux/${{ matrix.arch }}
          CACHE_KEY: ${{ matrix.service }}-${{ matrix.arch }}
          GITHUB_TOKEN: ${{ github.token }}
          PUSH: ${{ steps.targets.outputs.push }}
          BUILD_ARGS: ${{ matrix.build_args }}
          ECR_TAGS: ${{ steps.targets.outputs.ecr_tags }}
          GHCR_TAGS: ${{ steps.targets.outputs.ghcr_tags }}

  manifest:
    name: Publish multi-arch manifest (${{ matrix.service }})
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    strategy:
      fail-fast: false
      matrix:
        service:
          - graph
          - api
          - frontend
          - ai-worker-ts
          - integration-worker
    permissions:
      contents: read
      packages: write
    steps:
      - name: Login to GHCR
        uses: docker/login-action@5e57cd118135c172c3672efd75eb46360885c0ef # v3.6.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@e468171a9de216ec08956ac3ada2f0791b6bd435 # v3.11.1

      - name: Join arch variants into multi-arch tags
        env:
          IMAGE: ghcr.io/${{ github.repository_owner }}/hash/${{ matrix.service }}
          SHA: ${{ github.sha }}
        run: |
          docker buildx imagetools create \
            --tag "$IMAGE:latest" \
            "$IMAGE:latest-arm64" \
            "$IMAGE:latest-amd64"
          docker buildx imagetools create \
            --tag "$IMAGE:sha-$SHA" \
            "$IMAGE:sha-$SHA-arm64" \
            "$IMAGE:sha-$SHA-amd64"

  deploy:
    name: Redeploy ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: graph
            cluster: h-stage-euc1-app
            service_name: h-stage-euc1-app-graph
          - service: graph-admin
            cluster: h-stage-euc1-app
            service_name: h-stage-euc1-app-graph-admin
          - service: type-fetcher
            cluster: h-stage-euc1-app
            service_name: h-stage-euc1-app-type-fetcher
          - service: api
            cluster: h-stage-euc1-app
            service_name: h-stage-euc1-app-api
          - service: kratos
            cluster: h-stage-euc1-auth
            service_name: h-stage-euc1-auth-kratos
          - service: hydra
            cluster: h-stage-euc1-auth
            service_name: h-stage-euc1-auth-hydra
          - service: ai-ts-worker
            cluster: h-stage-euc1-worker
            service_name: h-stage-euc1-worker-ai-ts
          - service: integration-worker
            cluster: h-stage-euc1-worker
            service_name: h-stage-euc1-worker-integration
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Configure AWS credentials (ECS deploy)
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a # v4.3.1
        with:
          role-to-assume: arn:aws:iam::${{ env.AWS_DEPLOY_ACCOUNT_ID }}:role/${{ env.OIDC_HASH_CD_DEPLOY_ROLE }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Redeploy ${{ matrix.service }} staging service
        uses: ./.github/actions/redeploy-ecs-service
        with:
          ECS_CLUSTER_NAME: ${{ matrix.cluster }}
          ECS_SERVICE_NAME: ${{ matrix.service_name }}

  notify-slack-deploy:
    name: Notify Slack on backend deploy failure
    needs: deploy
    runs-on: ubuntu-latest
    if: ${{ failure() && github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch') }}
    steps:
      - name: Slack Notification
        uses: rtCamp/action-slack-notify@c58b60ee33df2229ed2d2eed86eeaf7e6c527c5a
        env:
          SLACK_LINK_NAMES: true
          SLACK_MESSAGE: "Error deploying the HASH backend <!subteam^S09KH99698T>" # Notifies @infra
          SLACK_TITLE: Backend deployment failed
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_USERNAME: GitHub

  # Single gate suitable as a Required status check in branch protection. The
  # underlying matrix jobs change as services are added/removed; this job's
  # name is stable.
  passed:
    name: Deployments passed
    needs: [setup, sourcemaps, build, manifest, deploy]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check setup
        run: |
          [[ ${{ needs.setup.result }} = success ]]
      - name: Check sourcemaps
        run: |
          [[ ${{ needs.sourcemaps.result }} =~ success|skipped ]]
      - name: Check build
        run: |
          [[ ${{ needs.build.result }} = success ]]
      - name: Check manifest
        run: |
          [[ ${{ needs.manifest.result }} =~ success|skipped ]]
      - name: Check deploy
        run: |
          [[ ${{ needs.deploy.result }} =~ success|skipped ]]

      - name: Notify Slack on merge-queue failure
        uses: rtCamp/action-slack-notify@c58b60ee33df2229ed2d2eed86eeaf7e6c527c5a
        if: ${{ failure() && github.event_name == 'merge_group' }}
        env:
          SLACK_LINK_NAMES: true
          SLACK_MESSAGE: "At least one deployment job for a Pull Request in the Merge Queue failed <!subteam^S09KH99698T>" # Notifies @devops
          SLACK_TITLE: Deployment failed
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_USERNAME: GitHub
          VAULT_ADDR: ""
          VAULT_TOKEN: ""
