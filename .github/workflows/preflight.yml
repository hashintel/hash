name: Preflight

on:
  pull_request:
    paths:
      - ".github/workflows/preflight.yml"
  pull_request_target:
    types: [opened, synchronize, reopened, edited]
  merge_group:

jobs:
  stale-approvals:
    name: Stale approvals
    permissions:
      actions: read
      contents: read
      # Required by the reusable workflow to extract job_workflow_ref from the
      # OIDC token to resolve the correct checkout ref for the composite action.
      # see: https://github.com/actions/toolkit/issues/1264
      # TODO: Remove once $/ syntax is available
      # see: https://github.com/orgs/community/discussions/26245#discussioncomment-15601440
      id-token: write
      pull-requests: write
    uses: hashintel/.github/.github/workflows/dismiss-stale-approvals.yml@178dfcde6c67af354901ab4f38330bdc114d0d38

  dependencies:
    name: Dependencies
    permissions:
      contents: read
      pull-requests: write
    uses: hashintel/.github/.github/workflows/dependencies.yml@178dfcde6c67af354901ab4f38330bdc114d0d38

  todo-comments:
    name: Todo comments
    permissions:
      contents: read
    uses: hashintel/.github/.github/workflows/todo-comments.yml@178dfcde6c67af354901ab4f38330bdc114d0d38
