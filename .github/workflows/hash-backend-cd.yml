on:
  workflow_dispatch: {}
  push:
    branches:
      - main
  pull_request: {}
  merge_group: {}

env:
  AWS_REGION: eu-central-1
  AWS_ECR_ACCOUNT_ID: 469596578827
  AWS_DEPLOY_ACCOUNT_ID: 054238437032
  OIDC_HASH_CD_PUSH_ROLE: github-oidc-hash-cd-push
  OIDC_HASH_CD_DEPLOY_ROLE: github-oidc-hash-cd-deploy

name: HASH backend deployment
jobs:
  build:
    name: Build${{ (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && ' and push' || '' }} ${{ matrix.service }} (${{ matrix.arch }})
    runs-on: ${{ matrix.arch == 'arm64' && 'ubuntu-24.04-arm' || 'ubuntu-24.04' }}
    strategy:
      fail-fast: false
      matrix:
        service:
          - graph
          - api
          - frontend
          - kratos
          - hydra
          - ai-worker-ts
          - integration-worker
        arch: [arm64, amd64]
        # Services that only publish to ECR don't need an amd64 build — ECR is
        # arm64-only (staging ECS runs on Graviton).
        exclude:
          - { service: kratos, arch: amd64 }
          - { service: hydra, arch: amd64 }
        # Per-service config: paths plus the registries to publish to. Joined
        # with every remaining (service, arch) combination via `include` merge.
        include:
          - service: graph
            push: [ecr, ghcr]
            dockerfile: apps/hash-graph/docker/Dockerfile
            context: .
          - service: api
            push: [ecr, ghcr]
            dockerfile: apps/hash-api/docker/Dockerfile
            context: .
          - service: frontend
            push: [ghcr]
            dockerfile: apps/hash-frontend/docker/Dockerfile
            context: .
            # TODO(FE-752): Remove once frontend is runtime-configurable
            build_args: |
              API_ORIGIN=http://localhost:5001
              FRONTEND_URL=http://localhost:3000
          - service: kratos
            push: [ecr]
            dockerfile: infra/compose/kratos/Dockerfile
            context: infra/compose/kratos
          - service: hydra
            push: [ecr]
            dockerfile: infra/compose/hydra/Dockerfile
            context: infra/compose/hydra
          - service: ai-worker-ts
            push: [ecr, ghcr]
            dockerfile: apps/hash-ai-worker-ts/docker/Dockerfile
            context: .
          - service: integration-worker
            push: [ecr, ghcr]
            dockerfile: apps/hash-integration-worker/docker/Dockerfile
            context: .
    permissions:
      id-token: write
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      # ECR is arm64-only (staging ECS runs on Graviton) AND main-only — the
      # OIDC trust policy rejects role assumption from other refs anyway, so
      # don't even attempt the auth on feature branches.
      - name: Configure AWS credentials (ECR push)
        if: contains(matrix.push, 'ecr') && matrix.arch == 'arm64' && github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a # v4.3.1
        with:
          role-to-assume: arn:aws:iam::${{ env.AWS_ECR_ACCOUNT_ID }}:role/${{ env.OIDC_HASH_CD_PUSH_ROLE }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Build${{ (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && ' and push' || '' }} ${{ matrix.service }} (${{ matrix.arch }})
        uses: ./.github/actions/docker-build-push
        with:
          CONTEXT_PATH: ${{ github.workspace }}/${{ matrix.context }}
          DOCKERFILE_LOCATION: ${{ github.workspace }}/${{ matrix.dockerfile }}
          PLATFORM: linux/${{ matrix.arch }}
          CACHE_KEY: ${{ matrix.service }}-${{ matrix.arch }}
          GITHUB_TOKEN: ${{ github.token }}
          # Push only when there is at least one target this build can reach.
          PUSH: ${{ ((contains(matrix.push, 'ecr') && matrix.arch == 'arm64' && github.ref == 'refs/heads/main') || contains(matrix.push, 'ghcr')) && (github.event_name == 'push' || github.event_name == 'workflow_dispatch') }}
          BUILD_ARGS: ${{ matrix.build_args }}
          # ECR stays single-arch (arm64) and main-only.
          ECR_TAGS: |
            ${{ (contains(matrix.push, 'ecr') && matrix.arch == 'arm64' && github.ref == 'refs/heads/main') && format('{0}.dkr.ecr.{1}.amazonaws.com/{2}/{3}:staging', env.AWS_ECR_ACCOUNT_ID, env.AWS_REGION, github.repository, matrix.service) || '' }}
            ${{ (contains(matrix.push, 'ecr') && matrix.arch == 'arm64' && github.ref == 'refs/heads/main') && format('{0}.dkr.ecr.{1}.amazonaws.com/{2}/{3}:sha-{4}', env.AWS_ECR_ACCOUNT_ID, env.AWS_REGION, github.repository, matrix.service, github.sha) || '' }}
            ${{ (contains(matrix.push, 'ecr') && matrix.arch == 'arm64' && github.ref == 'refs/heads/main') && format('{0}.dkr.ecr.{1}.amazonaws.com/{2}/{3}:run-{4}', env.AWS_ECR_ACCOUNT_ID, env.AWS_REGION, github.repository, matrix.service, github.run_id) || '' }}
          # GHCR gets per-arch tags; the follow-up `manifest` job joins them
          # into multi-arch `latest` / `sha-<sha>` tags.
          GHCR_TAGS: |
            ${{ contains(matrix.push, 'ghcr') && format('ghcr.io/{0}/hash/{1}:latest-{2}', github.repository_owner, matrix.service, matrix.arch) || '' }}
            ${{ contains(matrix.push, 'ghcr') && format('ghcr.io/{0}/hash/{1}:sha-{2}-{3}', github.repository_owner, matrix.service, github.sha, matrix.arch) || '' }}

  manifest:
    name: Publish multi-arch manifest (${{ matrix.service }})
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    strategy:
      fail-fast: false
      matrix:
        service:
          - graph
          - api
          - frontend
          - ai-worker-ts
          - integration-worker
    permissions:
      contents: read
      packages: write
    steps:
      - name: Login to GHCR
        uses: docker/login-action@5e57cd118135c172c3672efd75eb46360885c0ef # v3.6.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@e468171a9de216ec08956ac3ada2f0791b6bd435 # v3.11.1

      - name: Join arch variants into multi-arch tags
        env:
          IMAGE: ghcr.io/${{ github.repository_owner }}/hash/${{ matrix.service }}
          SHA: ${{ github.sha }}
        run: |
          docker buildx imagetools create \
            --tag "$IMAGE:latest" \
            "$IMAGE:latest-arm64" \
            "$IMAGE:latest-amd64"
          docker buildx imagetools create \
            --tag "$IMAGE:sha-$SHA" \
            "$IMAGE:sha-$SHA-arm64" \
            "$IMAGE:sha-$SHA-amd64"

  deploy:
    name: Deploy ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: graph
            cluster: h-stage-euc1-app
            service_name: h-stage-euc1-app-graph
          - service: graph-admin
            cluster: h-stage-euc1-app
            service_name: h-stage-euc1-app-graph-admin
          - service: type-fetcher
            cluster: h-stage-euc1-app
            service_name: h-stage-euc1-app-type-fetcher
          - service: api
            cluster: h-stage-euc1-app
            service_name: h-stage-euc1-app-api
          - service: kratos
            cluster: h-stage-euc1-auth
            service_name: h-stage-euc1-auth-kratos
          - service: hydra
            cluster: h-stage-euc1-auth
            service_name: h-stage-euc1-auth-hydra
          - service: ai-ts-worker
            cluster: h-stage-euc1-worker
            service_name: h-stage-euc1-worker-ai-ts
          - service: integration-worker
            cluster: h-stage-euc1-worker
            service_name: h-stage-euc1-worker-integration
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Configure AWS credentials (ECS deploy)
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a # v4.3.1
        with:
          role-to-assume: arn:aws:iam::${{ env.AWS_DEPLOY_ACCOUNT_ID }}:role/${{ env.OIDC_HASH_CD_DEPLOY_ROLE }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Redeploy ${{ matrix.service }} staging service
        uses: ./.github/actions/redeploy-ecs-service
        with:
          ECS_CLUSTER_NAME: ${{ matrix.cluster }}
          ECS_SERVICE_NAME: ${{ matrix.service_name }}

  notify-slack:
    name: Notify Slack on failure
    needs: deploy
    runs-on: ubuntu-latest
    if: ${{ failure() && github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch') }}
    steps:
      - name: Slack Notification
        uses: rtCamp/action-slack-notify@c58b60ee33df2229ed2d2eed86eeaf7e6c527c5a
        env:
          SLACK_LINK_NAMES: true
          SLACK_MESSAGE: "Error deploying the HASH backend <!subteam^S09KH99698T>" # Notifies @infra
          SLACK_TITLE: Backend deployment failed
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_USERNAME: GitHub
