on:
  workflow_dispatch: {}
  push:
    branches:
      - main
    paths:
      - ".github/workflows/hash-backend-cd.yml"
      - "apps/hash-ai-worker-ts/**"
      - "apps/hash-integration-worker/**"
      - "apps/hash-graph/**"
      - "apps/hash-api/**"
      - "apps/hash-external-services/temporal/**"
      - "apps/hash-external-services/kratos/**"
      - "apps/hash-external-services/hydra/**"
      - "libs/@local/**"
      - "infra/docker/api/prod/**"

env:
  ARTIFACTS_ECR_URL: 469596578827.dkr.ecr.eu-central-1.amazonaws.com
  ARTIFACTS_ECR_ROLE_ARN: arn:aws:iam::469596578827:role/h-artifacts-euc1-ecr-push
  ARTIFACTS_AWS_REGION: eu-central-1

name: HASH backend deployment
jobs:
  build-graph:
    name: Build and push HASH graph image
    runs-on: ubuntu-24.04-arm
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Authenticate Vault
        id: secrets
        uses: hashicorp/vault-action@4c06c5ccf5c0761b6029f56cfb1dcf5565918a3b # v3.4.0
        with:
          exportToken: true
          url: ${{ secrets.VAULT_ADDR }}
          method: jwt
          role: prod
          secrets: |
            aws/creds/prod-deploy access_key | AWS_ACCESS_KEY_ID ;
            aws/creds/prod-deploy secret_key | AWS_SECRET_ACCESS_KEY ;
            aws/creds/prod-deploy security_token | AWS_SESSION_TOKEN

      - name: Push to artifacts ECR
        uses: ./.github/actions/docker-build-push
        with:
          SHORTNAME: "graph"
          CONTEXT_PATH: ${{ github.workspace }}/
          DOCKERFILE_LOCATION: ${{ github.workspace }}/apps/hash-graph/docker/Dockerfile
          AWS_ACCESS_KEY_ID: ${{ steps.secrets.outputs.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ steps.secrets.outputs.AWS_SECRET_ACCESS_KEY }}
          AWS_SESSION_TOKEN: ${{ steps.secrets.outputs.AWS_SESSION_TOKEN }}
          AWS_REGION: ${{ env.ARTIFACTS_AWS_REGION }}
          AWS_ECR_URL: ${{ env.ARTIFACTS_ECR_URL }}
          ROLE_ARN: ${{ env.ARTIFACTS_ECR_ROLE_ARN }}
          IMAGE_NAME: ${{ github.repository }}/graph
          IMAGE_TAG: staging
          GITHUB_TOKEN: ${{ github.token }}

  build-api:
    name: Build and push HASH api image
    runs-on: ubuntu-24.04-arm
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Authenticate Vault
        id: secrets
        uses: hashicorp/vault-action@4c06c5ccf5c0761b6029f56cfb1dcf5565918a3b # v3.4.0
        with:
          exportToken: true
          url: ${{ secrets.VAULT_ADDR }}
          method: jwt
          role: prod
          secrets: |
            aws/creds/prod-deploy access_key | AWS_ACCESS_KEY_ID ;
            aws/creds/prod-deploy secret_key | AWS_SECRET_ACCESS_KEY ;
            aws/creds/prod-deploy security_token | AWS_SESSION_TOKEN

      - name: Push to artifacts ECR
        uses: ./.github/actions/docker-build-push
        with:
          SHORTNAME: "api"
          CONTEXT_PATH: ${{ github.workspace }}
          DOCKERFILE_LOCATION: ${{ github.workspace }}/infra/docker/api/prod/Dockerfile
          AWS_ACCESS_KEY_ID: ${{ steps.secrets.outputs.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ steps.secrets.outputs.AWS_SECRET_ACCESS_KEY }}
          AWS_SESSION_TOKEN: ${{ steps.secrets.outputs.AWS_SESSION_TOKEN }}
          AWS_REGION: ${{ env.ARTIFACTS_AWS_REGION }}
          AWS_ECR_URL: ${{ env.ARTIFACTS_ECR_URL }}
          ROLE_ARN: ${{ env.ARTIFACTS_ECR_ROLE_ARN }}
          IMAGE_NAME: ${{ github.repository }}/api
          IMAGE_TAG: staging
          GITHUB_TOKEN: ${{ github.token }}

  build-kratos:
    name: Build and push Kratos image
    runs-on: ubuntu-24.04-arm
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Authenticate Vault
        id: secrets
        uses: hashicorp/vault-action@4c06c5ccf5c0761b6029f56cfb1dcf5565918a3b # v3.4.0
        with:
          exportToken: true
          url: ${{ secrets.VAULT_ADDR }}
          method: jwt
          role: prod
          secrets: |
            aws/creds/prod-deploy access_key | AWS_ACCESS_KEY_ID ;
            aws/creds/prod-deploy secret_key | AWS_SECRET_ACCESS_KEY ;
            aws/creds/prod-deploy security_token | AWS_SESSION_TOKEN

      - name: Push to artifacts ECR
        uses: ./.github/actions/docker-build-push
        with:
          SHORTNAME: "kratos"
          CONTEXT_PATH: ${{ github.workspace }}/apps/hash-external-services/kratos
          DOCKERFILE_LOCATION: ${{ github.workspace }}/apps/hash-external-services/kratos/Dockerfile
          AWS_ACCESS_KEY_ID: ${{ steps.secrets.outputs.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ steps.secrets.outputs.AWS_SECRET_ACCESS_KEY }}
          AWS_SESSION_TOKEN: ${{ steps.secrets.outputs.AWS_SESSION_TOKEN }}
          AWS_REGION: ${{ env.ARTIFACTS_AWS_REGION }}
          AWS_ECR_URL: ${{ env.ARTIFACTS_ECR_URL }}
          ROLE_ARN: ${{ env.ARTIFACTS_ECR_ROLE_ARN }}
          IMAGE_NAME: ${{ github.repository }}/kratos
          IMAGE_TAG: staging
          GITHUB_TOKEN: ${{ github.token }}

  build-hydra:
    name: Build and push Hydra image
    runs-on: ubuntu-24.04-arm
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Authenticate Vault
        id: secrets
        uses: hashicorp/vault-action@4c06c5ccf5c0761b6029f56cfb1dcf5565918a3b # v3.4.0
        with:
          exportToken: true
          url: ${{ secrets.VAULT_ADDR }}
          method: jwt
          role: prod
          secrets: |
            aws/creds/prod-deploy access_key | AWS_ACCESS_KEY_ID ;
            aws/creds/prod-deploy secret_key | AWS_SECRET_ACCESS_KEY ;
            aws/creds/prod-deploy security_token | AWS_SESSION_TOKEN

      - name: Push to artifacts ECR
        uses: ./.github/actions/docker-build-push
        with:
          SHORTNAME: "hydra"
          CONTEXT_PATH: ${{ github.workspace }}/apps/hash-external-services/hydra
          DOCKERFILE_LOCATION: ${{ github.workspace }}/apps/hash-external-services/hydra/Dockerfile
          AWS_ACCESS_KEY_ID: ${{ steps.secrets.outputs.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ steps.secrets.outputs.AWS_SECRET_ACCESS_KEY }}
          AWS_SESSION_TOKEN: ${{ steps.secrets.outputs.AWS_SESSION_TOKEN }}
          AWS_REGION: ${{ env.ARTIFACTS_AWS_REGION }}
          AWS_ECR_URL: ${{ env.ARTIFACTS_ECR_URL }}
          ROLE_ARN: ${{ env.ARTIFACTS_ECR_ROLE_ARN }}
          IMAGE_NAME: ${{ github.repository }}/hydra
          IMAGE_TAG: staging
          GITHUB_TOKEN: ${{ github.token }}
          BUILD_ARGS: |
            ENV=prod

  build-ts-worker:
    name: Build and push Temporal TS AI Worker
    runs-on: ubuntu-24.04-arm
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Authenticate Vault
        id: secrets
        uses: hashicorp/vault-action@4c06c5ccf5c0761b6029f56cfb1dcf5565918a3b # v3.4.0
        with:
          exportToken: true
          url: ${{ secrets.VAULT_ADDR }}
          method: jwt
          role: prod
          secrets: |
            aws/creds/prod-deploy access_key | AWS_ACCESS_KEY_ID ;
            aws/creds/prod-deploy secret_key | AWS_SECRET_ACCESS_KEY ;
            aws/creds/prod-deploy security_token | AWS_SESSION_TOKEN

      - name: Push to artifacts ECR
        uses: ./.github/actions/docker-build-push
        with:
          SHORTNAME: "temporal-worker-ai-ts"
          CONTEXT_PATH: ${{ github.workspace }}
          DOCKERFILE_LOCATION: ${{ github.workspace }}/apps/hash-ai-worker-ts/docker/Dockerfile
          AWS_ACCESS_KEY_ID: ${{ steps.secrets.outputs.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ steps.secrets.outputs.AWS_SECRET_ACCESS_KEY }}
          AWS_SESSION_TOKEN: ${{ steps.secrets.outputs.AWS_SESSION_TOKEN }}
          AWS_REGION: ${{ env.ARTIFACTS_AWS_REGION }}
          AWS_ECR_URL: ${{ env.ARTIFACTS_ECR_URL }}
          ROLE_ARN: ${{ env.ARTIFACTS_ECR_ROLE_ARN }}
          IMAGE_NAME: ${{ github.repository }}/ai-worker-ts
          IMAGE_TAG: staging
          GITHUB_TOKEN: ${{ github.token }}
          BUILD_ARGS: |
            GOOGLE_CLOUD_WORKLOAD_IDENTITY_FEDERATION_CONFIG_JSON: ${{ secrets.GOOGLE_CLOUD_WORKLOAD_IDENTITY_FEDERATION_CONFIG_JSON }}

  build-integration-worker:
    name: Build and push Temporal integration Worker
    runs-on: ubuntu-24.04-arm
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Authenticate Vault
        id: secrets
        uses: hashicorp/vault-action@4c06c5ccf5c0761b6029f56cfb1dcf5565918a3b # v3.4.0
        with:
          exportToken: true
          url: ${{ secrets.VAULT_ADDR }}
          method: jwt
          role: prod
          secrets: |
            aws/creds/prod-deploy access_key | AWS_ACCESS_KEY_ID ;
            aws/creds/prod-deploy secret_key | AWS_SECRET_ACCESS_KEY ;
            aws/creds/prod-deploy security_token | AWS_SESSION_TOKEN

      - name: Push to artifacts ECR
        uses: ./.github/actions/docker-build-push
        with:
          SHORTNAME: "temporal-integration-worker"
          CONTEXT_PATH: ${{ github.workspace }}
          DOCKERFILE_LOCATION: ${{ github.workspace }}/apps/hash-integration-worker/docker/Dockerfile
          AWS_ACCESS_KEY_ID: ${{ steps.secrets.outputs.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ steps.secrets.outputs.AWS_SECRET_ACCESS_KEY }}
          AWS_SESSION_TOKEN: ${{ steps.secrets.outputs.AWS_SESSION_TOKEN }}
          AWS_REGION: ${{ env.ARTIFACTS_AWS_REGION }}
          AWS_ECR_URL: ${{ env.ARTIFACTS_ECR_URL }}
          ROLE_ARN: ${{ env.ARTIFACTS_ECR_ROLE_ARN }}
          IMAGE_NAME: ${{ github.repository }}/integration-worker
          IMAGE_TAG: staging
          GITHUB_TOKEN: ${{ github.token }}

  promote-staging:
    name: Trigger staging promotion
    runs-on: ubuntu-latest
    needs:
      - build-graph
      - build-api
      - build-kratos
      - build-hydra
      - build-ts-worker
      - build-integration-worker
    permissions:
      id-token: write
    steps:
      - name: Authenticate Vault
        id: secrets
        uses: hashicorp/vault-action@4c06c5ccf5c0761b6029f56cfb1dcf5565918a3b # v3.4.0
        with:
          url: ${{ secrets.VAULT_ADDR }}
          method: jwt
          role: dev
          secrets: |
            automation/data/pipelines/hash/dev github_worker_app_id | GITHUB_WORKER_APP_ID ;
            automation/data/pipelines/hash/dev github_worker_app_private_key | GITHUB_WORKER_APP_PRIVATE_KEY ;

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@29824e69f54612133e76f7eaac726eef6c875baf # v2.2.1
        with:
          app-id: ${{ steps.secrets.outputs.GITHUB_WORKER_APP_ID }}
          private-key: ${{ steps.secrets.outputs.GITHUB_WORKER_APP_PRIVATE_KEY }}
          owner: hashintel
          repositories: internal-infra

      - name: Trigger promote workflow
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          HTTP_CODE=$(curl -s -o /tmp/dispatch-response.json -w "%{http_code}" -X POST \
            -H "Authorization: token ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/hashintel/internal-infra/actions/workflows/promote.yml/dispatches" \
            -d "{
              \"ref\": \"main\",
              \"inputs\": {
                \"target_environment\": \"staging\",
                \"image_tag\": \"${{ github.sha }}\",
                \"dry_run\": \"false\",
                \"services\": \"all\"
              }
            }")
          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 400 ]; then
            echo "::error::Dispatch failed (HTTP ${HTTP_CODE}): $(cat /tmp/dispatch-response.json)"
            exit 1
          fi
          echo "Triggered staging promotion for sha-${GITHUB_SHA:0:12} (HTTP ${HTTP_CODE})"

  notify-slack:
    name: Notify Slack on failure
    needs:
      - promote-staging
    runs-on: ubuntu-latest
    if: failure()
    permissions:
      id-token: write
    steps:
      - name: Authenticate Vault
        id: secrets
        uses: hashicorp/vault-action@4c06c5ccf5c0761b6029f56cfb1dcf5565918a3b # v3.4.0
        with:
          url: ${{ secrets.VAULT_ADDR }}
          method: jwt
          role: prod
          secrets: |
            infrastructure/data/slack hash_bot_oauth_token | SLACK_BOT_TOKEN ;

      - name: Notify Slack
        env:
          SLACK_BOT_TOKEN: ${{ steps.secrets.outputs.SLACK_BOT_TOKEN }}
          WORKFLOW_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          PAYLOAD=$(jq -n \
            --arg channel "C02TWBTT3ED" \
            --arg url "$WORKFLOW_URL" \
            --arg sha "${GITHUB_SHA:0:12}" \
            '{
              channel: $channel,
              text: "Backend build failed",
              blocks: [
                { type: "section", text: { type: "mrkdwn", text: ("*<\($url)|Staging backend build failed>*  <!subteam^S09KH99698T>\nCommit: `\($sha)`") } }
              ],
              attachments: [{ color: "#dc3545", blocks: [] }]
            }')
          curl -s --max-time 10 -o /dev/null -X POST "https://slack.com/api/chat.postMessage" \
            -H "Authorization: Bearer ${SLACK_BOT_TOKEN}" \
            -H "Content-Type: application/json; charset=utf-8" \
            -d "$PAYLOAD" || true
