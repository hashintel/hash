on:
  workflow_dispatch: {}
  push:
    branches:
      - main
  pull_request: {}
  merge_group: {}

env:
  AWS_REGION: eu-central-1
  AWS_ECR_ACCOUNT_ID: 469596578827
  AWS_DEPLOY_ACCOUNT_ID: 054238437032
  OIDC_HASH_CD_PUSH_ROLE: github-oidc-hash-cd-push
  OIDC_HASH_CD_DEPLOY_ROLE: github-oidc-hash-cd-deploy

name: HASH backend deployment
jobs:
  build:
    name: Build${{ (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && ' and push' || '' }} ${{ matrix.service }}
    runs-on: ubuntu-24.04-arm
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: graph
            ghcr: true
            ecr: true
            dockerfile: apps/hash-graph/docker/Dockerfile
            context: .
          - service: api
            ghcr: true
            ecr: true
            dockerfile: apps/hash-api/docker/Dockerfile
            context: .
          - service: frontend
            ghcr: true
            dockerfile: apps/hash-frontend/docker/Dockerfile
            context: .
            # TODO(FE-752): Remove once frontend is runtime-configurable
            build_args: |
              API_ORIGIN=http://localhost:5001
              FRONTEND_URL=http://localhost:3000
          - service: kratos
            ecr: true
            dockerfile: infra/compose/kratos/Dockerfile
            context: infra/compose/kratos
          - service: hydra
            ecr: true
            dockerfile: infra/compose/hydra/Dockerfile
            context: infra/compose/hydra
          - service: ai-worker-ts
            ghcr: true
            ecr: true
            dockerfile: apps/hash-ai-worker-ts/docker/Dockerfile
            context: .
          - service: integration-worker
            ghcr: true
            ecr: true
            dockerfile: apps/hash-integration-worker/docker/Dockerfile
            context: .
    permissions:
      id-token: write
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Configure AWS credentials (ECR push)
        if: matrix.ecr && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a # v4.3.1
        with:
          role-to-assume: arn:aws:iam::${{ env.AWS_ECR_ACCOUNT_ID }}:role/${{ env.OIDC_HASH_CD_PUSH_ROLE }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Build${{ (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && ' and push' || '' }} ${{ matrix.service }}
        uses: ./.github/actions/docker-build-push
        with:
          CONTEXT_PATH: ${{ github.workspace }}/${{ matrix.context }}
          DOCKERFILE_LOCATION: ${{ github.workspace }}/${{ matrix.dockerfile }}
          AWS_ECR_URL: ${{ matrix.ecr && format('{0}.dkr.ecr.{1}.amazonaws.com', env.AWS_ECR_ACCOUNT_ID, env.AWS_REGION) || '' }}
          ECR_IMAGE_NAME: ${{ matrix.ecr && format('{0}/{1}', github.repository, matrix.service) || '' }}
          GHCR_IMAGE_NAME: ${{ matrix.ghcr && format('hash/{0}', matrix.service) || '' }}
          IMAGE_TAG: staging
          GITHUB_TOKEN: ${{ github.token }}
          PUSH: ${{ github.event_name == 'push' || github.event_name == 'workflow_dispatch' }}
          BUILD_ARGS: ${{ matrix.build_args }}

  deploy:
    name: Deploy ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: graph
            cluster: h-stage-euc1-app
            service_name: h-stage-euc1-app-graph
          - service: graph-admin
            cluster: h-stage-euc1-app
            service_name: h-stage-euc1-app-graph-admin
          - service: type-fetcher
            cluster: h-stage-euc1-app
            service_name: h-stage-euc1-app-type-fetcher
          - service: api
            cluster: h-stage-euc1-app
            service_name: h-stage-euc1-app-api
          - service: kratos
            cluster: h-stage-euc1-auth
            service_name: h-stage-euc1-auth-kratos
          - service: hydra
            cluster: h-stage-euc1-auth
            service_name: h-stage-euc1-auth-hydra
          - service: ai-ts-worker
            cluster: h-stage-euc1-worker
            service_name: h-stage-euc1-worker-ai-ts
          - service: integration-worker
            cluster: h-stage-euc1-worker
            service_name: h-stage-euc1-worker-integration
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Configure AWS credentials (ECS deploy)
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a # v4.3.1
        with:
          role-to-assume: ${{ env.OIDC_HASH_CD_DEPLOY_ROLE }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Redeploy ${{ matrix.service }} staging service
        uses: ./.github/actions/redeploy-ecs-service
        with:
          ECS_CLUSTER_NAME: ${{ matrix.cluster }}
          ECS_SERVICE_NAME: ${{ matrix.service_name }}

  notify-slack:
    name: Notify Slack on failure
    needs: deploy
    runs-on: ubuntu-latest
    if: ${{ failure() && github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch') }}
    steps:
      - name: Slack Notification
        uses: rtCamp/action-slack-notify@c58b60ee33df2229ed2d2eed86eeaf7e6c527c5a
        env:
          SLACK_LINK_NAMES: true
          SLACK_MESSAGE: "Error deploying the HASH backend <!subteam^S09KH99698T>" # Notifies @infra
          SLACK_TITLE: Backend deployment failed
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_USERNAME: GitHub
