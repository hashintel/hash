on:
  workflow_dispatch: {}
  push:
    branches:
      - main
  pull_request: {}
  merge_group: {}

env:
  AWS_REGION: eu-central-1

  ARTIFACTS_ECR_URL: 469596578827.dkr.ecr.eu-central-1.amazonaws.com
  OIDC_HASH_CD_PUSH_ROLE: arn:aws:iam::469596578827:role/github-oidc-hash-cd-push
  OIDC_HASH_CD_DEPLOY_ROLE: arn:aws:iam::054238437032:role/github-oidc-hash-cd-deploy

  APP_CLUSTER_NAME: h-stage-euc1-app
  APP_GRAPH_SERVICE_NAME: h-stage-euc1-app-graph
  APP_GRAPH_ADMIN_SERVICE_NAME: h-stage-euc1-app-graph-admin
  APP_TYPE_FETCHER_SERVICE_NAME: h-stage-euc1-app-type-fetcher
  APP_API_SERVICE_NAME: h-stage-euc1-app-api
  WORKER_CLUSTER_NAME: h-stage-euc1-worker
  WORKER_AI_TS_SERVICE_NAME: h-stage-euc1-worker-ai-ts
  WORKER_INTEGRATION_SERVICE_NAME: h-stage-euc1-worker-integration
  AUTH_CLUSTER_NAME: h-stage-euc1-auth
  AUTH_KRATOS_SERVICE_NAME: h-stage-euc1-auth-kratos
  AUTH_HYDRA_SERVICE_NAME: h-stage-euc1-auth-hydra

name: HASH backend deployment
jobs:
  build:
    name: Build${{ (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && ' and push' || '' }} ${{ matrix.ghcr }}
    runs-on: ubuntu-24.04-arm
    strategy:
      fail-fast: false
      matrix:
        include:
          - ghcr: hash-graph
            ecr: graph
            dockerfile: apps/hash-graph/docker/Dockerfile
            context: .
          - ghcr: hash-api
            ecr: api
            dockerfile: apps/hash-api/docker/Dockerfile
            context: .
          - ghcr: hash-frontend
            dockerfile: apps/hash-frontend/docker/Dockerfile
            context: .
          - ghcr: hash-kratos
            ecr: kratos
            dockerfile: infra/compose/kratos/Dockerfile
            context: infra/compose/kratos
          - ghcr: hash-hydra
            ecr: hydra
            dockerfile: infra/compose/hydra/Dockerfile
            context: infra/compose/hydra
          - ghcr: hash-ai-worker-ts
            ecr: ai-worker-ts
            dockerfile: apps/hash-ai-worker-ts/docker/Dockerfile
            context: .
          - ghcr: hash-integration-worker
            ecr: integration-worker
            dockerfile: apps/hash-integration-worker/docker/Dockerfile
            context: .
    permissions:
      id-token: write
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Configure AWS credentials (ECR push)
        if: matrix.ecr && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a # v4.3.1
        with:
          role-to-assume: ${{ env.OIDC_HASH_CD_PUSH_ROLE }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Build${{ (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && ' and push' || '' }} ${{ matrix.ghcr }}
        uses: ./.github/actions/docker-build-push
        with:
          CONTEXT_PATH: ${{ github.workspace }}/${{ matrix.context }}
          DOCKERFILE_LOCATION: ${{ github.workspace }}/${{ matrix.dockerfile }}
          AWS_ECR_URL: ${{ matrix.ecr && env.ARTIFACTS_ECR_URL || '' }}
          ECR_IMAGE_NAME: ${{ matrix.ecr && format('{0}/{1}', github.repository, matrix.ecr) || '' }}
          GHCR_IMAGE_NAME: ${{ matrix.ghcr }}
          IMAGE_TAG: staging
          GITHUB_TOKEN: ${{ github.token }}
          PUSH: ${{ github.event_name == 'push' || github.event_name == 'workflow_dispatch' }}

  deploy:
    name: Deploy ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: graph,
            cluster: APP_CLUSTER_NAME,
            service_name: APP_GRAPH_SERVICE_NAME,

          - {
              service: graph-admin,
              cluster: APP_CLUSTER_NAME,
              service_name: APP_GRAPH_ADMIN_SERVICE_NAME,
            }
          - {
              service: type-fetcher,
              cluster: APP_CLUSTER_NAME,
              service_name: APP_TYPE_FETCHER_SERVICE_NAME,
            }
          - {
              service: api,
              cluster: APP_CLUSTER_NAME,
              service_name: APP_API_SERVICE_NAME,
            }
          - {
              service: kratos,
              cluster: AUTH_CLUSTER_NAME,
              service_name: AUTH_KRATOS_SERVICE_NAME,
            }
          - {
              service: hydra,
              cluster: AUTH_CLUSTER_NAME,
              service_name: AUTH_HYDRA_SERVICE_NAME,
            }
          - {
              service: ai-ts-worker,
              cluster: WORKER_CLUSTER_NAME,
              service_name: WORKER_AI_TS_SERVICE_NAME,
            }
          - {
              service: integration-worker,
              cluster: WORKER_CLUSTER_NAME,
              service_name: WORKER_INTEGRATION_SERVICE_NAME,
            }
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Configure AWS credentials (ECS deploy)
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a # v4.3.1
        with:
          role-to-assume: ${{ env.OIDC_HASH_CD_DEPLOY_ROLE }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Redeploy ${{ matrix.service }} staging service
        uses: ./.github/actions/redeploy-ecs-service
        with:
          ECS_CLUSTER_NAME: ${{ env[matrix.cluster] }}
          ECS_SERVICE_NAME: ${{ env[matrix.service_name] }}

  notify-slack:
    name: Notify Slack on failure
    needs: deploy
    runs-on: ubuntu-latest
    if: ${{ failure() && github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch') }}
    steps:
      - name: Slack Notification
        uses: rtCamp/action-slack-notify@c58b60ee33df2229ed2d2eed86eeaf7e6c527c5a
        env:
          SLACK_LINK_NAMES: true
          SLACK_MESSAGE: "Error deploying the HASH backend <!subteam^S09KH99698T>" # Notifies @devops
          SLACK_TITLE: Backend deployment failed
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_USERNAME: GitHub
