# THROWAWAY — SRE-739 probe. Delete once job-level `queue: max` is confirmed.
#
# Tests the ONLY thing that distinguishes `queue: max` from the default
# `queue: single`: queue depth. Both keep 1 running + 1 pending — so 2 runs
# prove nothing. The difference shows only at depth >= 3 (1 running + 2 pending):
#   - queue: single -> the MIDDLE pending run is CANCELLED (only 1 pending kept)
#   - queue: max    -> all pending runs survive and run FIFO
#
# All runs share ONE job-level group (`…-serial`) so they actually contend.
# The workflow-level group is run_id (never evicted), mirroring deploy.yml.
#
# How to test: push >= 4 waves in quick succession (done automatically here).
# Result: if EVERY run reaches `success` (none Cancelled), `queue: max` held
# >1 pending — which `queue: single` cannot. Watch the START/END times: they
# must NOT overlap (strict FIFO serialization).

name: Concurrency probe (SRE-739)

on:
  push:
    branches:
      - t/sre-739-fix-backend-deploy-concurrency-dropped-builds-and-out-of
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.run_id }}
  cancel-in-progress: false

jobs:
  serial:
    name: serial (push ${{ github.run_number }})
    runs-on: ubuntu-latest
    concurrency:
      group: ${{ github.workflow }}-serial
      queue: max
    steps:
      - name: Occupy the shared group
        run: |
          echo "run #${{ github.run_number }}  id=${{ github.run_id }}  sha=${GITHUB_SHA:0:8}"
          echo "START run #${{ github.run_number }} at $(date -u +%H:%M:%S)"
          sleep 15
          echo "END   run #${{ github.run_number }} at $(date -u +%H:%M:%S)"
