name: Build Docker image
description: Build a single-platform Docker image and optionally push it to ECR and/or GHCR.

inputs:
  GITHUB_TOKEN:
    description: GitHub token (used for `--mount=type=secret,id=GITHUB_TOKEN` in the Dockerfiles and for GHCR auth).
    required: true
  DOCKERFILE_LOCATION:
    description: Location of the Dockerfile.
    required: true
  CONTEXT_PATH:
    description: Build context.
    required: false
    default: ${{ github.workspace }}
  PLATFORM:
    description: Target platform for this build (e.g. `linux/arm64`, `linux/amd64`). The runner must be native to the platform — no cross-arch emulation. Multi-arch manifests are assembled by a separate job via `docker buildx imagetools create`.
    required: false
    default: linux/arm64
  CACHE_KEY:
    description: Buildx layer-cache key, typically `<service>-<arch>`.
    required: true
  ECR_TAGS:
    description: Newline-separated list of fully qualified ECR tags. Empty to skip ECR. The calling job must have AWS credentials configured.
    required: false
    default: ""
  GHCR_TAGS:
    description: Newline-separated list of fully qualified GHCR tags. Empty to skip GHCR.
    required: false
    default: ""
  PUSH:
    description: Whether to push to the registries. Set to "false" for build-only validation (pull_request / merge_group). No registry auth is required when false.
    required: false
    default: "true"
  BUILD_ARGS:
    description: Additional Docker build arguments (one `KEY=VALUE` per line). Intended only for non-secret values that need to be baked into the image at build-time, such as `NEXT_PUBLIC_*` URLs. Never pass secrets here — build-args end up in image history and are visible to anyone who can pull the image.
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Login to ECR
      if: inputs.PUSH == 'true' && inputs.ECR_TAGS != ''
      uses: ./.github/actions/docker-ecr-login

    - name: Login to GHCR
      if: inputs.PUSH == 'true' && inputs.GHCR_TAGS != ''
      uses: docker/login-action@5e57cd118135c172c3672efd75eb46360885c0ef # v3.6.0
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ inputs.GITHUB_TOKEN }}

    # docker-container driver (the default for setup-buildx-action) supports
    # local cache export; the runner's plain docker driver does not.
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@e468171a9de216ec08956ac3ada2f0791b6bd435 # v3.11.1

    - name: Cache Docker layers
      uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
      with:
        path: /tmp/.buildx-cache
        key: docker-${{ inputs.CACHE_KEY }}-${{ hashFiles('yarn.lock') }}
        restore-keys: |
          docker-${{ inputs.CACHE_KEY }}-${{ hashFiles('yarn.lock') }}
          docker-${{ inputs.CACHE_KEY }}-
          docker-

    - name: Build${{ inputs.PUSH == 'true' && ' and push' || '' }} ${{ inputs.CACHE_KEY }}
      uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6.18.0
      with:
        # The Dockerfile is in a leaf-folder without access to what it needs.
        # Thus the context is within the root, while the dockerfile is deeply nested.
        context: ${{ inputs.CONTEXT_PATH }}
        push: ${{ inputs.PUSH }}
        file: ${{ inputs.DOCKERFILE_LOCATION }}
        platforms: ${{ inputs.PLATFORM }}
        build-args: ${{ inputs.BUILD_ARGS }}
        secrets: |
          GITHUB_TOKEN=${{ inputs.GITHUB_TOKEN }}
        tags: |
          ${{ inputs.ECR_TAGS }}
          ${{ inputs.GHCR_TAGS }}
        labels: |
          ${{ inputs.GHCR_TAGS != '' && format('org.opencontainers.image.source=https://github.com/{0}', github.repository) || '' }}
        provenance: false
        cache-from: type=local,src=/tmp/.buildx-cache
        cache-to: type=local,mode=max,dest=/tmp/.buildx-cache-new

    - name: Move cache
      shell: bash
      run: |
        rm -rf /tmp/.buildx-cache
        mv /tmp/.buildx-cache-new /tmp/.buildx-cache
