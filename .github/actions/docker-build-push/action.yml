name: Build Docker image
description: >
  Build a single-platform Docker image and optionally push it to ECR (named
  tags) and/or GHCR (by digest). ECR stays tag-based (single-arch, ECS pulls
  `:staging`). GHCR is pushed *by digest only* — no per-arch tags — and the
  multi-arch manifest is assembled from those digests in a separate job. Every
  image carries `org.opencontainers.image.revision` so the mutable-tag guard
  can resolve which commit an existing tag points at. The build cache lives in
  GHCR (`type=registry`), keyed per service+arch.

inputs:
  GITHUB_TOKEN:
    description: GitHub token (used for `--mount=type=secret,id=GITHUB_TOKEN` in the Dockerfiles, GHCR auth, and the GHCR build cache).
    required: true
  DOCKERFILE_LOCATION:
    description: Location of the Dockerfile.
    required: true
  CONTEXT_PATH:
    description: Build context.
    required: false
    default: ${{ github.workspace }}
  PLATFORM:
    description: Target platform for this build (e.g. `linux/arm64`, `linux/amd64`). The runner must be native to the platform — no cross-arch emulation. Multi-arch manifests are assembled by a separate job from the per-arch digests.
    required: false
    default: linux/arm64
  CACHE_REF:
    description: >
      Fully-qualified GHCR ref for the build cache — a dedicated, private package
      per service+arch (e.g. `ghcr.io/hashintel/hash/graph/cache:arm64`), kept
      separate from the (possibly public) image package so the mode=max cache
      layers aren't exposed. Read by every build; written only when pushing
      (trusted builds), so PR/fork builds reuse the cache without polluting or
      failing to write it.
    required: true
  ECR_TAGS:
    description: Newline-separated list of fully qualified ECR tags. Empty to skip ECR. The calling job must have AWS credentials configured.
    required: false
    default: ""
  GHCR_IMAGE:
    description: >
      Fully-qualified GHCR repository WITHOUT a tag (e.g.
      `ghcr.io/hashintel/hash/graph`). When set and pushing, the image is pushed
      by digest (no tag); the digest is returned via the `ghcr-digest` output for
      the manifest job to assemble. Empty to skip GHCR.
    required: false
    default: ""
  PUSH:
    description: Whether to push to the registries. Set to "false" for build-only validation (pull_request / merge_group); the build still reads the GHCR cache but does not write it.
    required: false
    default: "true"
  BUILD_ARGS:
    description: Additional Docker build arguments (one `KEY=VALUE` per line). Intended only for non-secret values that need to be baked into the image at build-time, such as `NEXT_PUBLIC_*` URLs. Never pass secrets here — build-args end up in image history and are visible to anyone who can pull the image.
    required: false
    default: ""

outputs:
  ghcr-digest:
    description: The digest of the image pushed to GHCR (empty if GHCR was skipped or PUSH was false).
    value: ${{ steps.ghcr.outputs.digest }}

runs:
  using: composite
  steps:
    - name: Login to ECR
      if: inputs.PUSH == 'true' && inputs.ECR_TAGS != ''
      uses: ./.github/actions/docker-ecr-login

    # Always log in to GHCR: the build cache lives there, so even ECR-only and
    # validation-only builds need read (and, when pushing, write) access.
    - name: Login to GHCR
      uses: docker/login-action@5e57cd118135c172c3672efd75eb46360885c0ef # v3.6.0
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ inputs.GITHUB_TOKEN }}

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@e468171a9de216ec08956ac3ada2f0791b6bd435 # v3.11.1

    # Up to two of the three invocations run per job: `validate` on non-push
    # events, or ECR (tags) and/or GHCR (by digest) on push. They share one GHCR
    # registry cache (`CACHE_REF`), so the second is a near-total cache hit.
    # `push-by-digest` is output-global, so ECR and GHCR can't be one invocation.
    # `cache-to` runs on push/workflow_dispatch only (trusted events): PR and
    # merge_group read the cache (`cache-from`) but never write it, so fork PRs
    # can't hit a fatal cache-to write error and PR builds don't churn the tag.
    - name: Build ${{ inputs.PLATFORM }} (validate, no push)
      if: inputs.PUSH != 'true'
      uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6.18.0
      with:
        context: ${{ inputs.CONTEXT_PATH }}
        file: ${{ inputs.DOCKERFILE_LOCATION }}
        platforms: ${{ inputs.PLATFORM }}
        build-args: ${{ inputs.BUILD_ARGS }}
        secrets: |
          GITHUB_TOKEN=${{ inputs.GITHUB_TOKEN }}
        labels: |
          org.opencontainers.image.revision=${{ github.sha }}
          org.opencontainers.image.source=https://github.com/${{ github.repository }}
        provenance: false
        push: false
        cache-from: type=registry,ref=${{ inputs.CACHE_REF }}
        cache-to: ${{ (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && format('type=registry,ref={0},mode=max', inputs.CACHE_REF) || '' }}

    - name: Build and push to ECR
      if: inputs.PUSH == 'true' && inputs.ECR_TAGS != ''
      uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6.18.0
      with:
        context: ${{ inputs.CONTEXT_PATH }}
        file: ${{ inputs.DOCKERFILE_LOCATION }}
        platforms: ${{ inputs.PLATFORM }}
        build-args: ${{ inputs.BUILD_ARGS }}
        secrets: |
          GITHUB_TOKEN=${{ inputs.GITHUB_TOKEN }}
        labels: |
          org.opencontainers.image.revision=${{ github.sha }}
          org.opencontainers.image.source=https://github.com/${{ github.repository }}
        provenance: false
        push: true
        tags: ${{ inputs.ECR_TAGS }}
        cache-from: type=registry,ref=${{ inputs.CACHE_REF }}
        cache-to: ${{ (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && format('type=registry,ref={0},mode=max', inputs.CACHE_REF) || '' }}

    - name: Build and push to GHCR (by digest)
      id: ghcr
      if: inputs.PUSH == 'true' && inputs.GHCR_IMAGE != ''
      uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6.18.0
      with:
        context: ${{ inputs.CONTEXT_PATH }}
        file: ${{ inputs.DOCKERFILE_LOCATION }}
        platforms: ${{ inputs.PLATFORM }}
        build-args: ${{ inputs.BUILD_ARGS }}
        secrets: |
          GITHUB_TOKEN=${{ inputs.GITHUB_TOKEN }}
        labels: |
          org.opencontainers.image.revision=${{ github.sha }}
          org.opencontainers.image.source=https://github.com/${{ github.repository }}
        provenance: false
        outputs: type=image,name=${{ inputs.GHCR_IMAGE }},push-by-digest=true,name-canonical=true,push=true
        cache-from: type=registry,ref=${{ inputs.CACHE_REF }}
        cache-to: ${{ (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && format('type=registry,ref={0},mode=max', inputs.CACHE_REF) || '' }}
