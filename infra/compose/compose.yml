name: hash

volumes:
  hash-postgres-data:
  hash-vault-data:
  logs:
  loki_data:
  tempo_data:
  mimir_data:
  pyroscope_data:
  grafana_data:

services:
  postgres:
    profiles:
      - dev
      - hgres
      - hash
    build:
      context: ./postgres
    deploy:
      restart_policy:
        condition: on-failure
    environment:
      POSTGRES_USER: "${POSTGRES_USER:-postgres}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-postgres}"
      HASH_HYDRA_PG_USER: "${HASH_HYDRA_PG_USER:-hydra}"
      HASH_HYDRA_PG_PASSWORD: "${HASH_HYDRA_PG_PASSWORD:-hydra}"
      HASH_HYDRA_PG_DATABASE: "${HASH_HYDRA_PG_DATABASE:-hydra}"
      HASH_KRATOS_PG_USER: "${HASH_KRATOS_PG_USER:-kratos}"
      HASH_KRATOS_PG_PASSWORD: "${HASH_KRATOS_PG_PASSWORD:-kratos}"
      HASH_KRATOS_PG_DATABASE: "${HASH_KRATOS_PG_DATABASE:-kratos}"
      HASH_TEMPORAL_PG_USER: "${HASH_TEMPORAL_PG_USER:-temporal}"
      HASH_TEMPORAL_PG_PASSWORD: "${HASH_TEMPORAL_PG_PASSWORD:-temporal}"
      HASH_TEMPORAL_PG_DATABASE: "${HASH_TEMPORAL_PG_DATABASE:-temporal}"
      HASH_TEMPORAL_VISIBILITY_PG_DATABASE: "${HASH_TEMPORAL_VISIBILITY_PG_DATABASE:-temporal_visibility}"
      HASH_GRAPH_PG_USER: "${HASH_GRAPH_PG_USER:-graph}"
      HASH_GRAPH_PG_PASSWORD: "${HASH_GRAPH_PG_PASSWORD:-graph}"
      HASH_GRAPH_PG_DATABASE: "${HASH_GRAPH_PG_DATABASE:-graph}"
    volumes:
      - hash-postgres-data:/var/lib/postgresql/data
      - ./postgres/postgresql.conf:/etc/postgresql/postgresql.conf:ro
      - ./postgres/init-user-db.sh:/docker-entrypoint-initdb.d/init-user-db.sh:ro
    shm_size: 1GB
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test:
        [
          "CMD",
          "pg_isready",
          "-q",
          "-h",
          "postgres",
          "-U",
          "${POSTGRES_USER:-postgres}",
        ]
      interval: 2s
      timeout: 2s
      retries: 5
    command: -c 'config_file=/etc/postgresql/postgresql.conf' --track_commit_timestamp=on

  kratos-migrate:
    profiles:
      - dev
      - hash
    build:
      context: ./kratos
    depends_on:
      postgres:
        condition: service_healthy
    read_only: true
    security_opt:
      - no-new-privileges:true
    environment:
      DSN: "postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:${POSTGRES_PORT:-5432}/${HASH_KRATOS_PG_DATABASE:-kratos}"
    command: migrate sql -e --yes

  kratos:
    profiles:
      - dev
      - hash
    build:
      context: ./kratos
    depends_on:
      postgres:
        condition: service_healthy
      kratos-migrate:
        condition: service_completed_successfully
      otel-collector-healthcheck:
        condition: service_completed_successfully
    restart: unless-stopped
    ports:
      - "4433:4433" # public API
      - "4434:4434" # admin API
    environment:
      SECRETS_COOKIE: "VERY-INSECURE-AND-SHOULD-ONLY-BE-USED-IN-DEV"
      SECRETS_CIPHER: "32-LONG-SECRET-NOT-SECURE-AT-ALL"
      DSN: "postgres://${HASH_KRATOS_PG_USER:-kratos}:${HASH_KRATOS_PG_PASSWORD:-kratos}@postgres:${POSTGRES_PORT:-5432}/${HASH_KRATOS_PG_DATABASE:-kratos}"
      OAUTH2_PROVIDER_URL: "http://hydra:4445"
      TRACING_PROVIDER: "otel"
      TRACING_PROVIDERS_OTLP_INSECURE: "true"
      TRACING_PROVIDERS_OTLP_SERVER_URL: "otel-collector:4318"
      SERVE_PUBLIC_BASE_URL: "http://localhost:3000"
      SELFSERVICE_DEFAULT_BROWSER_RETURN_URL: "http://localhost:3000/"
      SELFSERVICE_ALLOWED_RETURN_URLS: "http://localhost:3000"
      SELFSERVICE_METHODS_LINK_CONFIG_BASE_URL: "http://localhost:3000"
      SELFSERVICE_FLOWS_ERROR_UI_URL: "http://localhost:3000/error"
      SELFSERVICE_FLOWS_LOGOUT_AFTER_DEFAULT_BROWSER_RETURN_URL: "http://localhost:3000/signin"
      SELFSERVICE_FLOWS_LOGIN_UI_URL: "http://localhost:3000/signin"
      SELFSERVICE_FLOWS_REGISTRATION_UI_URL: "http://localhost:3000/signup"
      SELFSERVICE_FLOWS_REGISTRATION_AFTER_PASSWORD_HOOKS_0_CONFIG_URL: "http://host.docker.internal:5001/kratos-after-registration"
      SELFSERVICE_FLOWS_REGISTRATION_AFTER_PASSWORD_HOOKS_0_CONFIG_AUTH_CONFIG_VALUE: "${KRATOS_API_KEY:-secret}"
      # OIDC / SSO — disabled by default. To enable, set in .env.local:
      #   KRATOS_OIDC_ENABLED=true
      #   KRATOS_OIDC_GOOGLE_CLIENT_ID=<your-client-id>
      #   KRATOS_OIDC_GOOGLE_CLIENT_SECRET=<your-client-secret>
      #   KRATOS_OIDC_MICROSOFT_CLIENT_ID=<your-client-id>
      #   KRATOS_OIDC_MICROSOFT_CLIENT_SECRET=<your-client-secret>
      #   KRATOS_OIDC_MICROSOFT_TENANT_ID=<your-tenant-id>
      SELFSERVICE_METHODS_OIDC_ENABLED: "${KRATOS_OIDC_ENABLED:-false}"
      SELFSERVICE_FLOWS_REGISTRATION_AFTER_OIDC_HOOKS_0_CONFIG_URL: "http://host.docker.internal:5001/kratos-after-registration"
      SELFSERVICE_FLOWS_REGISTRATION_AFTER_OIDC_HOOKS_0_CONFIG_AUTH_CONFIG_VALUE: "${KRATOS_API_KEY:-secret}"
      SELFSERVICE_METHODS_OIDC_CONFIG_BASE_REDIRECT_URI: "http://localhost:5001/auth"
      SELFSERVICE_METHODS_OIDC_CONFIG_PROVIDERS_0_CLIENT_ID: "${KRATOS_OIDC_GOOGLE_CLIENT_ID:-}"
      SELFSERVICE_METHODS_OIDC_CONFIG_PROVIDERS_0_CLIENT_SECRET: "${KRATOS_OIDC_GOOGLE_CLIENT_SECRET:-}"
      SELFSERVICE_METHODS_OIDC_CONFIG_PROVIDERS_1_CLIENT_ID: "${KRATOS_OIDC_MICROSOFT_CLIENT_ID:-}"
      SELFSERVICE_METHODS_OIDC_CONFIG_PROVIDERS_1_CLIENT_SECRET: "${KRATOS_OIDC_MICROSOFT_CLIENT_SECRET:-}"
      SELFSERVICE_METHODS_OIDC_CONFIG_PROVIDERS_1_MICROSOFT_TENANT: "${KRATOS_OIDC_MICROSOFT_TENANT_ID:-}"
      SELFSERVICE_FLOWS_VERIFICATION_UI_URL: "http://localhost:3000/verification"
      SELFSERVICE_FLOWS_RECOVERY_UI_URL: "http://localhost:3000/recovery"
      SELFSERVICE_FLOWS_SETTINGS_UI_URL: "http://localhost:3000/settings/security"
      SELFSERVICE_FLOWS_SETTINGS_PRIVILEGED_SESSION_MAX_AGE: "${SELFSERVICE_FLOWS_SETTINGS_PRIVILEGED_SESSION_MAX_AGE:-5m}"
      COURIER_SMTP_CONNECTION_URI: "smtps://test:test@mailslurper:1025/?skip_ssl_verify=true"
      LOG_LEVEL: trace
      LOG_FORMAT: text
      LOG_LEAK_SENSITIVE_VALUES: true
    command: serve --dev --watch-courier
    read_only: true
    security_opt:
      - no-new-privileges:true
    extra_hosts:
      - host.docker.internal:host-gateway

  hydra-migrate:
    profiles:
      - dev
    build:
      context: ./hydra
      args:
        ENV: dev
    depends_on:
      postgres:
        condition: service_healthy
    read_only: true
    security_opt:
      - no-new-privileges:true
    environment:
      DSN: "postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:${POSTGRES_PORT:-5432}/${HASH_HYDRA_PG_DATABASE:-hydra}"

    command: migrate sql -e --yes

  hydra:
    profiles:
      - dev
    build:
      context: ./hydra
      args:
        ENV: dev
    depends_on:
      postgres:
        condition: service_healthy
      hydra-migrate:
        condition: service_completed_successfully
      otel-collector-healthcheck:
        condition: service_completed_successfully
    restart: unless-stopped
    ports:
      - "4444:4444" # public API
      - "4445:4445" # admin API
    environment:
      DSN: "postgres://${HASH_HYDRA_PG_USER:-hydra}:${HASH_HYDRA_PG_PASSWORD:-hydra}@postgres:${POSTGRES_PORT:-5432}/${HASH_HYDRA_PG_DATABASE:-hydra}"
      SECRETS_COOKIE: "${HASH_HYDRA_SECRETS_COOKIE:-VERY-INSECURE-AND-SHOULD-ONLY-BE-USED-IN-DEV}"
      SECRETS_SYSTEM: "${HASH_HYDRA_SECRETS_SYSTEM:-VERY-INSECURE-AND-SHOULD-ONLY-BE-USED-IN-DEV}"
      URLS_CONSENT: "${API_ORIGIN:-http://localhost:5001}/oauth2/consent"
      URLS_IDENTITY_PROVIDER_PUBLICURL: "http://kratos:4433"
      URLS_IDENTITY_PROVIDER_URL: "http://kratos:4434"
      URLS_LOGIN: "${FRONTEND_URL:-http://localhost:3000}/signin"
      URLS_REGISTRATION: "${FRONTEND_URL:-http://localhost:3000}/signup"
      URLS_POST_LOGOUT_REDIRECT: "${FRONTEND_URL:-http://localhost:3000}"
      URLS_SELF_ISSUER: "${API_ORIGIN:-http://localhost:5001}"
      URLS_SELF_PUBLIC: "${API_ORIGIN:-http://localhost:5001}"
      TRACING_PROVIDER: "otel"
      TRACING_PROVIDERS_OTLP_INSECURE: "true"
      TRACING_PROVIDERS_OTLP_SERVER_URL: "otel-collector:4318"
      LOG_LEVEL: trace
    command: serve all --dev
    read_only: true
    security_opt:
      - no-new-privileges:true
    extra_hosts:
      - host.docker.internal:host-gateway

  mailslurper:
    profiles:
      - dev
      - hash
    image: oryd/mailslurper:latest-smtps
    security_opt:
      - no-new-privileges:true
    ports:
      - "1025:1025"
      - "4436:4436"
      - "4437:4437"

  redis:
    profiles:
      - dev
      - hash
    image: redis:8.6
    read_only: true
    deploy:
      restart_policy:
        condition: on-failure
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping | grep PONG"]
      interval: 2s
      timeout: 2s
      retries: 5
    security_opt:
      - no-new-privileges:true
    ports:
      - "6379:6379"

  temporal-migrate:
    profiles:
      - dev
      - hgres
      - hash
    image: "temporalio/admin-tools:${HASH_TEMPORAL_VERSION:-1.23.1.0}"
    depends_on:
      postgres:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true
    environment:
      SQL_PLUGIN: postgres12
      SQL_HOST: postgres
      SQL_PORT: "5432"
      # Intentionally the POSTGRES superuser — needs DDL on the new schemas.
      SQL_USER: "${POSTGRES_USER:-postgres}"
      SQL_PASSWORD: "${POSTGRES_PASSWORD:-postgres}"
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        set -eux
        temporal-sql-tool --db "${HASH_TEMPORAL_PG_DATABASE:-temporal}" setup-schema -v 0.0
        temporal-sql-tool --db "${HASH_TEMPORAL_PG_DATABASE:-temporal}" update-schema -d /etc/temporal/schema/postgresql/v12/temporal/versioned
        temporal-sql-tool --db "${HASH_TEMPORAL_VISIBILITY_PG_DATABASE:-temporal_visibility}" setup-schema -v 0.0
        temporal-sql-tool --db "${HASH_TEMPORAL_VISIBILITY_PG_DATABASE:-temporal_visibility}" update-schema -d /etc/temporal/schema/postgresql/v12/visibility/versioned

  temporal:
    profiles:
      - dev
      - hgres
      - hash
    container_name: temporal
    image: "temporalio/server:${HASH_TEMPORAL_VERSION:-1.23.1.0}"
    deploy:
      restart_policy:
        condition: on-failure
    depends_on:
      postgres:
        condition: service_healthy
      temporal-migrate:
        condition: service_completed_successfully
    healthcheck:
      test:
        [
          "CMD",
          "temporal",
          "workflow",
          "list",
          "--namespace",
          "HASH",
          "--address",
          "temporal:7233",
        ]
      interval: 10s
      timeout: 2s
      retries: 10
    environment:
      # This sets configuration values in
      # https://github.com/temporalio/temporal/blob/master/docker/config_template.yaml
      # posgres12 for v12+ of postgres.
      DB: "postgres12"
      DBNAME: "${HASH_TEMPORAL_PG_DATABASE:-temporal}"
      VISIBILITY_DBNAME: "${HASH_TEMPORAL_VISIBILITY_PG_DATABASE:-temporal_visibility}"
      DB_PORT: "5432"
      POSTGRES_USER: "${HASH_TEMPORAL_PG_USER:-temporal}"
      POSTGRES_PWD: "${HASH_TEMPORAL_PG_PASSWORD:-temporal}"
      POSTGRES_SEEDS: "postgres" # the hostname of the postgres container
      # Expose Prometheus-format metrics on port 8000 so the otel-collector
      # can scrape them and forward to Mimir.
      PROMETHEUS_ENDPOINT: "0.0.0.0:8000"
    security_opt:
      - no-new-privileges:true
    ports:
      - "${HASH_TEMPORAL_SERVER_PORT:-7233}:7233"

  temporal-setup:
    profiles:
      - dev
      - hgres
      - hash
    image: "temporalio/admin-tools:${HASH_TEMPORAL_VERSION:-1.23.1.0}"
    depends_on:
      temporal:
        condition: service_started
    security_opt:
      - no-new-privileges:true
    environment:
      TEMPORAL_ADDRESS: temporal:7233
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        set -eux
        until temporal operator cluster health | grep -q SERVING; do
          echo "Waiting for Temporal server to start..."
          sleep 1
        done
        if ! temporal operator namespace describe HASH > /dev/null 2>&1; then
          temporal operator namespace create --retention 7d --description "HASH namespace for Temporal Server." HASH
        fi

  temporal-ui:
    profiles:
      - dev
      - hgres
      - hash
    image: temporalio/ui:${HASH_TEMPORAL_UI_VERSION:-2.27.2}
    deploy:
      restart_policy:
        condition: on-failure
    depends_on:
      temporal:
        condition: service_healthy
      temporal-setup:
        condition: service_completed_successfully
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_CORS_ORIGINS: http://localhost:3000
    security_opt:
      - no-new-privileges:true
    ports:
      - "${HASH_TEMPORAL_UI_PORT:-3100}:8080"
    healthcheck:
      test: ["CMD", "/bin/sh", "-c", "nc -z $(hostname) 8080"]
      interval: 2s
      timeout: 2s
      retries: 10

  # ==========================================================================
  # Object storage (S3-compatible) — local MinIO for file uploads.
  # ==========================================================================
  minio:
    profiles:
      - dev
      - hash
    image: quay.io/minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_API_CORS_ALLOW_ORIGIN: ${FRONTEND_URL:-http://localhost:3000}
      MINIO_ROOT_USER: ${AWS_S3_UPLOADS_ACCESS_KEY_ID:-dev-s3-access-key-id}
      MINIO_ROOT_PASSWORD: ${AWS_S3_UPLOADS_SECRET_ACCESS_KEY:-dev-s3-secret-access-key}
    ports:
      - 9000:9000
      - 9001:9001
    volumes:
      - ../../var/uploads/s3:/data

  minio-ensure-bucket-exists:
    profiles:
      - dev
      - hash
    image: minio/mc
    depends_on:
      - minio
    restart: "no"
    security_opt:
      - no-new-privileges:true
    environment:
      MINIO_ROOT_USER: ${AWS_S3_UPLOADS_ACCESS_KEY_ID:-dev-s3-access-key-id}
      MINIO_ROOT_PASSWORD: ${AWS_S3_UPLOADS_SECRET_ACCESS_KEY:-dev-s3-secret-access-key}
      AWS_S3_UPLOADS_BUCKET: ${AWS_S3_UPLOADS_BUCKET:-dev-hash-bucket}
    entrypoint: |
      /bin/sh -c '
      mc alias set myminio http://minio:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD &&
      echo "Creating bucket $$AWS_S3_UPLOADS_BUCKET" &&
      mc mb myminio/$$AWS_S3_UPLOADS_BUCKET --ignore-existing
      '

  vault:
    profiles:
      - dev
      - hash
    image: hashicorp/vault
    ports:
      - "${HASH_VAULT_PORT:-8200}:8200"
    volumes:
      - hash-vault-data:/vault/file:rw
    cap_add:
      - IPC_LOCK
    healthcheck:
      test: ["CMD", "vault", "status"]
      interval: 2s
      timeout: 2s
      retries: 10
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: "${HASH_VAULT_ROOT_TOKEN:-dev_root_token}"
      VAULT_ADDR: "http://0.0.0.0:8200"
      VAULT_DEV_LISTEN_ADDRESS: "0.0.0.0:8200"
    security_opt:
      - no-new-privileges:true

  # ==========================================================================
  # Observability — OTel collector + Grafana stack (Loki/Tempo/Mimir/Pyroscope)
  # ==========================================================================
  otel-collector:
    profiles:
      - dev
      - hgres
      - hash
    image: otel/opentelemetry-collector-contrib:0.128.0
    command: ["--config=/etc/otelcol/config.yaml"]
    volumes:
      - ./opentelemetry-collector/otel-collector-config.yaml:/etc/otelcol/config.yaml:ro
    ports:
      - 4317:4317
    read_only: true
    security_opt:
      - no-new-privileges:true

  otel-collector-healthcheck:
    profiles:
      - dev
      - hgres
      - hash
    image: busybox
    depends_on:
      otel-collector:
        condition: service_started
    command: >
      sh -c 'for i in $(seq 1 60); do wget -q --spider http://otel-collector:13133 && exit 0 || sleep 1; done; exit 1'

  loki:
    profiles:
      - observability
    image: grafana/loki:3.5.2
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - ./loki/loki.yaml:/etc/loki/local-config.yaml:ro
      - loki_data:/loki
    restart: unless-stopped
    read_only: true
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3100/metrics"]
      interval: 2s
      timeout: 2s
      retries: 10

  tempo:
    profiles:
      - observability
    image: grafana/tempo:2.8.1
    volumes:
      - ./tempo/tempo.yaml:/etc/tempo.yaml:ro
      - tempo_data:/var/tempo
    restart: unless-stopped
    read_only: true
    security_opt:
      - no-new-privileges:true
    command: ["-config.file=/etc/tempo.yaml"]
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3200/status"]
      interval: 2s
      timeout: 2s
      retries: 10

  mimir:
    profiles:
      - observability
    image: grafana/mimir:3.0.2
    volumes:
      - ./mimir/mimir.yml:/etc/mimir/mimir.yml:ro
      - mimir_data:/data
    command:
      - "-config.file=/etc/mimir/mimir.yml"
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true

  pyroscope:
    profiles:
      - observability
    image: grafana/pyroscope:1.14.1
    ports:
      - "4040:4040"
    volumes:
      - ./pyroscope/pyroscope.yaml:/etc/pyroscope/config.yaml:ro
      - pyroscope_data:/data
    command:
      - "-config.file=/etc/pyroscope/config.yaml"
    restart: unless-stopped
    read_only: true
    security_opt:
      - no-new-privileges:true

  grafana:
    profiles:
      - observability
    image: grafana/grafana:12.0.2
    ports:
      - "3001:3000"
    depends_on:
      tempo:
        condition: service_healthy
      loki:
        condition: service_healthy
      mimir:
        condition: service_started
      pyroscope:
        condition: service_started
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_AUTH_DISABLE_LOGIN_FORM=true
    restart: unless-stopped
    healthcheck:
      test:
        ["CMD", "wget", "--spider", "-q", "http://localhost:3000/api/health"]
      interval: 2s
      timeout: 2s
      retries: 10
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # ==========================================================================
  # HASH-developed application services.
  # ==========================================================================
  graph-migrate:
    profiles:
      - hgres
      - hash
    init: true
    depends_on:
      postgres:
        condition: service_healthy
    image: ghcr.io/hashintel/hash/graph
    read_only: true
    security_opt:
      - no-new-privileges:true
    volumes:
      - logs:/logs
    command: migrate
    environment:
      # Intentionally use the POSTGRES user as it's the "superadmin" which has access to schema
      HASH_GRAPH_PG_USER: "${POSTGRES_USER:-postgres}"
      HASH_GRAPH_PG_PASSWORD: "${POSTGRES_PASSWORD:-postgres}"
      HASH_GRAPH_PG_HOST: "postgres"
      HASH_GRAPH_PG_PORT: "5432"
      HASH_GRAPH_PG_DATABASE: "${HASH_GRAPH_PG_DATABASE:-graph}"
      HASH_GRAPH_LOG_CONSOLE_FORMAT: "${HASH_GRAPH_LOG_CONSOLE_FORMAT:-full}"
      HASH_GRAPH_LOG_FOLDER: "/logs/graph-migrations"
      HASH_GRAPH_SENTRY_DSN: "${HASH_GRAPH_SENTRY_DSN-}"
      HASH_GRAPH_LOG_LEVEL: "${HASH_GRAPH_LOG_LEVEL:-info}"
      HASH_OTLP_ENDPOINT: "http://otel-collector:4317"
      RUST_BACKTRACE: 1

  graph:
    profiles:
      - hgres
      - hash
    init: true
    depends_on:
      postgres:
        condition: service_healthy
      temporal-setup:
        condition: service_completed_successfully
      graph-migrate:
        condition: service_completed_successfully
      otel-collector-healthcheck:
        condition: service_completed_successfully
    image: ghcr.io/hashintel/hash/graph
    read_only: true
    security_opt:
      - no-new-privileges:true
    volumes:
      - logs:/logs
    command: server
    environment:
      HASH_GRAPH_PG_USER: "${HASH_GRAPH_PG_USER:-graph}"
      HASH_GRAPH_PG_PASSWORD: "${HASH_GRAPH_PG_PASSWORD:-graph}"
      HASH_GRAPH_PG_HOST: "postgres"
      HASH_GRAPH_PG_PORT: "5432"
      HASH_GRAPH_PG_DATABASE: "${HASH_GRAPH_PG_DATABASE:-graph}"
      HASH_GRAPH_ALLOWED_URL_DOMAIN_PATTERN: '${HASH_GRAPH_ALLOWED_URL_DOMAIN_PATTERN:-(?:http://localhost:3000|https://hash\.ai)/@(?P<shortname>[\w-]+)/types/(?P<kind>(?:data-type)|(?:property-type)|(?:entity-type))/[\w\-_%]+/}'
      HASH_GRAPH_EMBED_TYPE_FETCHER: "true"
      HASH_GRAPH_HTTP_HOST: "0.0.0.0"
      HASH_GRAPH_HTTP_PORT: "4000"
      HASH_GRAPH_LOG_LEVEL: "${HASH_GRAPH_LOG_LEVEL:-info}"
      HASH_GRAPH_LOG_CONSOLE_FORMAT: "${HASH_GRAPH_LOG_CONSOLE_FORMAT:-full}"
      HASH_GRAPH_LOG_FOLDER: "/logs/graph-service"
      HASH_GRAPH_SENTRY_DSN: "${HASH_GRAPH_SENTRY_DSN-}"
      HASH_TEMPORAL_SERVER_HOST: "http://temporal"
      HASH_TEMPORAL_SERVER_PORT: "7233"
      HASH_GRAPH_OPENAI_API_KEY: "${OPENAI_API_KEY-}"
      HASH_OTLP_ENDPOINT: "http://otel-collector:4317"
      RUST_BACKTRACE: 0
    ports:
      - "${HASH_GRAPH_HTTP_PORT:-4000}:4000"
    healthcheck:
      test:
        ["CMD", "/hash-graph", "server", "--healthcheck", "--api-port", "4000"]
      interval: 2s
      timeout: 2s
      retries: 10

  api-migrate:
    profiles:
      - hash
    image: ghcr.io/hashintel/hash/api
    depends_on:
      graph:
        condition: service_healthy
    restart: "no"
    command: ["start:migrate"]
    environment:
      HASH_GRAPH_HTTP_HOST: "graph"
      HASH_GRAPH_HTTP_PORT: "4000"
      HASH_TEMPORAL_SERVER_HOST: "http://temporal"
      HASH_TEMPORAL_SERVER_PORT: "7233"
      HASH_KRATOS_PUBLIC_URL: "http://kratos:4433"
      HASH_KRATOS_ADMIN_URL: "http://kratos:4434"
      HASH_OTLP_ENDPOINT: "http://otel-collector:4317"
      LOG_LEVEL: info

  api:
    profiles:
      - hash
    image: ghcr.io/hashintel/hash/api
    depends_on:
      redis:
        condition: service_healthy
      otel-collector-healthcheck:
        condition: service_completed_successfully
      api-migrate:
        condition: service_completed_successfully
    deploy:
      restart_policy:
        condition: on-failure
    environment:
      FRONTEND_URL: "${FRONTEND_URL:-http://localhost:3000}"

      API_ORIGIN: "${API_ORIGIN:-http://localhost:5001}"
      HASH_SEED_USERS: "${HASH_SEED_USERS:-}"

      HASH_GRAPH_HTTP_HOST: "graph"
      HASH_GRAPH_HTTP_PORT: "4000"
      LOG_LEVEL: "${LOG_LEVEL:-info}"

      HASH_REDIS_HOST: "redis"
      HASH_REDIS_PORT: "6379"

      HASH_VAULT_HOST: "http://vault"
      HASH_VAULT_PORT: "${HASH_VAULT_PORT:-8200}"
      HASH_VAULT_ROOT_TOKEN: "${HASH_VAULT_ROOT_TOKEN:-dev_root_token}"
      HASH_VAULT_MOUNT_PATH: "secret"

      HASH_INTEGRATION_QUEUE_NAME: "${HASH_INTEGRATION_QUEUE_NAME:-integration}"

      HASH_KRATOS_PUBLIC_URL: "http://kratos:4433"
      HASH_KRATOS_ADMIN_URL: "http://kratos:4434"
      KRATOS_API_KEY: "${KRATOS_API_KEY:-secret}"
      INTERNAL_API_KEY: "${INTERNAL_API_KEY:-development-api-key}"

      HASH_TEMPORAL_SERVER_HOST: "http://temporal"
      HASH_TEMPORAL_SERVER_PORT: "7233"

      HASH_OTLP_ENDPOINT: "http://otel-collector:4317"

      GOOGLE_OAUTH_CLIENT_ID: "${GOOGLE_OAUTH_CLIENT_ID:-}"
      GOOGLE_OAUTH_CLIENT_SECRET: "${GOOGLE_OAUTH_CLIENT_SECRET:-}"

      FILE_UPLOAD_PROVIDER: "${FILE_UPLOAD_PROVIDER:-AWS_S3}"
      AWS_REGION: "${AWS_REGION:-local}"
      AWS_S3_UPLOADS_BUCKET: "${AWS_S3_UPLOADS_BUCKET:-dev-hash-bucket}"
      AWS_S3_UPLOADS_ACCESS_KEY_ID: "${AWS_S3_UPLOADS_ACCESS_KEY_ID:-dev-s3-access-key-id}"
      AWS_S3_UPLOADS_SECRET_ACCESS_KEY: "${AWS_S3_UPLOADS_SECRET_ACCESS_KEY:-dev-s3-secret-access-key}"
      AWS_S3_UPLOADS_ENDPOINT: "http://minio:9000"
      AWS_S3_UPLOADS_FORCE_PATH_STYLE: "${AWS_S3_UPLOADS_FORCE_PATH_STYLE:-true}"
    ports:
      - "5001:5001"
      # frontend shares this netns (network_mode: service:api); its port is published here
      - "3000:3000"

  frontend:
    profiles:
      - hash
    image: ghcr.io/hashintel/hash/frontend
    network_mode: "service:api"
    depends_on:
      api:
        condition: service_healthy
    deploy:
      restart_policy:
        condition: on-failure
    environment:
      FRONTEND_URL: "${FRONTEND_URL:-http://localhost:3000}"
      API_ORIGIN: "${API_ORIGIN:-http://localhost:5001}"

  ai-worker:
    profiles:
      - hash
    image: ghcr.io/hashintel/hash/ai-worker-ts
    depends_on:
      graph:
        condition: service_healthy
      temporal:
        condition: service_healthy
      temporal-setup:
        condition: service_completed_successfully
      otel-collector-healthcheck:
        condition: service_completed_successfully
    deploy:
      restart_policy:
        condition: on-failure
    environment:
      HASH_GRAPH_HTTP_HOST: "graph"
      HASH_GRAPH_HTTP_PORT: "4000"
      HASH_TEMPORAL_SERVER_HOST: "http://temporal"
      HASH_TEMPORAL_SERVER_PORT: "7233"
      HASH_OTLP_ENDPOINT: "http://otel-collector:4317"
      INTERNAL_API_KEY: "${INTERNAL_API_KEY:-development-api-key}"
      HASH_VAULT_HOST: "http://vault"
      HASH_VAULT_PORT: "${HASH_VAULT_PORT:-8200}"
      HASH_VAULT_ROOT_TOKEN: "${HASH_VAULT_ROOT_TOKEN:-dev_root_token}"
      HASH_VAULT_MOUNT_PATH: "secret"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-dummy}"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-dummy}"
      AWS_REGION: "${AWS_REGION:-local}"
      HASH_TEMPORAL_WORKER_AI_AWS_ACCESS_KEY_ID: "${HASH_TEMPORAL_WORKER_AI_AWS_ACCESS_KEY_ID:-dummy}"
      HASH_TEMPORAL_WORKER_AI_AWS_SECRET_ACCESS_KEY: "${HASH_TEMPORAL_WORKER_AI_AWS_SECRET_ACCESS_KEY:-dummy}"

  integration-worker:
    profiles:
      - hash
    image: ghcr.io/hashintel/hash/integration-worker
    depends_on:
      graph:
        condition: service_healthy
      temporal:
        condition: service_healthy
      temporal-setup:
        condition: service_completed_successfully
      otel-collector-healthcheck:
        condition: service_completed_successfully
    deploy:
      restart_policy:
        condition: on-failure
    environment:
      HASH_GRAPH_HTTP_HOST: "graph"
      HASH_GRAPH_HTTP_PORT: "4000"
      HASH_TEMPORAL_SERVER_HOST: "http://temporal"
      HASH_TEMPORAL_SERVER_PORT: "7233"
      HASH_OTLP_ENDPOINT: "http://otel-collector:4317"
      INTERNAL_API_KEY: "${INTERNAL_API_KEY:-development-api-key}"
